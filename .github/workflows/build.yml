name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore non-MAUI projects
        run: |
          dotnet restore StarterApp.Api/StarterApp.Api.csproj
          dotnet restore StarterApp.Database/StarterApp.Database.csproj
          dotnet restore StarterApp.Migrations/StarterApp.Migrations.csproj

      - name: Build non-MAUI projects
        run: |
          dotnet build StarterApp.Api/StarterApp.Api.csproj --configuration Release --no-restore
          dotnet build StarterApp.Database/StarterApp.Database.csproj --configuration Release --no-restore
          dotnet build StarterApp.Migrations/StarterApp.Migrations.csproj --configuration Release --no-restore

      - name: Test (if test projects exist)
        shell: bash
        run: |
          set -e
          mkdir -p TestResults
          TEST_PROJECTS=$(find . -type f \( -name "*Test*.csproj" -o -name "*Tests*.csproj" \))
          if [ -z "$TEST_PROJECTS" ]; then
            echo "No test projects found. Skipping tests."
            exit 0
          fi

          echo "Running tests for:"
          echo "$TEST_PROJECTS"

          while IFS= read -r project; do
            [ -z "$project" ] && continue
            project_name=$(basename "$project" .csproj)
            dotnet test "$project" --configuration Release --verbosity normal --logger "trx;LogFileName=${project_name}.trx" --results-directory TestResults
          done <<< "$TEST_PROJECTS"

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-trx
          path: TestResults/**/*.trx
          if-no-files-found: warn
